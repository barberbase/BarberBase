                price_paise:
                  $ref: '#/components/schemas/Paise'
                is_active:
                  type: boolean
                is_popular:
                  type: boolean
      responses:
        '200':
          description: Updated

  /admin/locations/{location_id}/arrival-pin/regenerate:
    post:
      tags: [Admin - Location]
      summary: Regenerate the static arrival PIN for this location
      description: |
        Owner regenerates PIN if suspected of being shared externally.
        New PIN must be written on the counter laminated card.
        All existing queue entries that haven't arrived yet now require the new PIN.
      operationId: regenerateArrivalPin
      security:
        - StaffJWT: []
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDv7'
      responses:
        '200':
          description: New PIN generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  new_pin:
                    type: string
                    example: "8362"
                    description: Display once to owner. Then only accessible from /staff/shop/status.

  /admin/staff:
    post:
      tags: [Admin - Staff]
      summary: Add a new staff member
      operationId: createStaffMember
      security:
        - StaffJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone_number, role]
              properties:
                name:
                  type: string
                  maxLength: 100
                phone_number:
                  $ref: '#/components/schemas/PhoneNumber'
                role:
                  type: string
                  enum: [manager, barber]
      responses:
        '201':
          description: Staff member created

  # ════════════════════════════════════════════════════════════════════════════
  # BHEJNA WEBHOOK INGRESS — BhejnaKey auth only
  # ════════════════════════════════════════════════════════════════════════════

  /webhooks/bhejna:
    post:
      tags: [Webhooks]
      summary: Receive normalized WhatsApp event from Bhejna
      description: |
        CRITICAL: Write to webhook_events table BEFORE returning 200.
        INSERT ... ON CONFLICT (source, external_event_id) DO NOTHING.
        Always return 200 (idempotent). Never return 4xx to Bhejna (causes retries).
        
        Async Go worker processes webhook_events WHERE status = 'pending'
        using SKIP LOCKED for safe parallel processing.
        
        Handled event_types:
        - message.received: Customer joins queue, replies to prompts, sends OTP
        - flow.completed: WhatsApp Flow form submission (future)
        - message.status: Delivery receipts (for notification tracking)
      operationId: receiveBhejnaWebhook
      security:
        - BhejnaKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bhejna_event_id, event_type, channel, received_at, business_phone_number, sender]
              properties:
                bhejna_event_id:
                  type: string
                  description: Used as external_event_id for idempotency
                event_type:
                  type: string
                  enum: [message.received, flow.completed, message.status]
                channel:
                  type: string
                  enum: [whatsapp]
                received_at:
                  type: string
                  format: date-time
                business_phone_number:
                  type: string
                  description: Routes to correct tenant/location
                sender:
                  type: object
                  required: [phone_number]
                  properties:
                    phone_number:
                      $ref: '#/components/schemas/PhoneNumber'
                      description: Primary canonical identity. Always required from Bhejna.
                    bsuid:
                      type: string
                      nullable: true
                      description: Stored in customer_identities as supplementary lookup. Not used for sending.
                    display_name:
                      type: string
                      nullable: true
                message:
                  type: object
                  properties:
                    meta_message_id:
                      type: string
                    type:
                      type: string
                      enum: [text, button, interactive, flow_response]
                    body:
                      type: string
                      nullable: true
                    button_payload:
                      type: string
                      nullable: true
                    flow_response:
                      type: object
                      nullable: true
                      additionalProperties: true
      responses:
        '200':
          description: Acknowledged. Always 200. Processing is async.

  # ════════════════════════════════════════════════════════════════════════════
  # AI AGENT TOOLS — Clean tool-call-friendly endpoints
  # ════════════════════════════════════════════════════════════════════════════

  /agent/locations/{location_id}/info:
    get:
      tags: [AI Agent]
      summary: "[TOOL] Get shop info and live queue status"
      description: |
        Combined tool for AI agent. Returns everything needed to answer
        "Is Star Salon open?", "How long is the wait?", "What services do they have?"
        in a single call.
      operationId: agentGetShopInfo
      security:
        - AIAgentToken: []
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDv7'
      responses:
        '200':
          description: Shop info for agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: '#/components/schemas/LocationStatus'
                  popular_services:
                    type: array
                    description: Top 5 is_popular variants for quick suggestions
                    items:
                      allOf:
                        - $ref: '#/components/schemas/ServiceVariant'
                        - type: object
                          properties:
                            group_name:
                              type: string
                            category_name:
                              type: string

  /agent/queue/join:
    post:
      tags: [AI Agent]
      summary: "[TOOL] Join queue on behalf of customer"
      description: |
        AI agent calls this after resolving customer intent to variant_ids.
        Identical logic to /queue/join but with initiated_via = ai_agent.
        phone_number is required (agent has it from conversation context).
      operationId: agentJoinQueue
      security:
        - AIAgentToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location_id, variant_ids, phone_number, idempotency_key]
              properties:
                location_id:
                  $ref: '#/components/schemas/UUIDv7'
                variant_ids:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/UUIDv7'
                phone_number:
                  $ref: '#/components/schemas/PhoneNumber'
                party_size:
                  type: integer
                  default: 1
                customer_name:
                  type: string
                  nullable: true
                idempotency_key:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Joined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueEntryPublic'
        '409':
          description: Already in queue
        '422':
          description: Booking blocked

  /agent/appointments/book:
    post:
      tags: [AI Agent]
      summary: "[TOOL] Book appointment on behalf of customer"
      description: Agent version of /appointments/book. Same logic, same response.
      operationId: agentBookAppointment
      security:
        - AIAgentToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location_id, variant_ids, scheduled_start_at, phone_number, idempotency_key]
              properties:
                location_id:
                  $ref: '#/components/schemas/UUIDv7'
                variant_ids:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/UUIDv7'
                scheduled_start_at:
                  type: string
                  format: date-time
                phone_number:
                  $ref: '#/components/schemas/PhoneNumber'
                party_size:
                  type: integer
                  default: 1
                customer_name:
                  type: string
                  nullable: true
                idempotency_key:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'

  /agent/customer/status:
    get:
      tags: [AI Agent]
      summary: "[TOOL] Get customer's current queue or appointment status"
      description: |
        Agent calls this when customer asks "What's my token number?" or 
        "How long until my turn?" in WhatsApp conversation.
      operationId: agentGetCustomerStatus
      security:
        - AIAgentToken: []
      parameters:
        - name: phone_number
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/PhoneNumber'
        - name: location_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UUIDv7'
      responses:
        '200':
          description: Customer status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueEntryPublic'
        '404':
          description: No active entry found

  /agent/customer/cancel:
    post:
      tags: [AI Agent]
      summary: "[TOOL] Cancel customer's queue entry"
      description: Agent calls this when customer says "Cancel my booking"
      operationId: agentCancelEntry
      security:
        - AIAgentToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone_number, location_id]
              properties:
                phone_number:
                  $ref: '#/components/schemas/PhoneNumber'
                location_id:
                  $ref: '#/components/schemas/UUIDv7'
      responses:
        '200':
          description: Cancelled
        '422':
          description: Cannot cancel (in_progress)
        '404':
          description: No active entry

  # ── Staff Push (PWA — Service Worker background context) ───────────────────

  /staff/push/subscribe:
    post:
      tags: [Staff - Push]
      summary: Register or update a Web Push subscription for this staff member
      description: |
        Called from the dashboard after Notification.permission is granted.
        Stores the W3C PushSubscription on the staff_members row (latest wins).
        Overwrites any previous subscription — one subscription per staff member.
        See: 16_web_push_service_worker.md — "Registration Flow"
      operationId: subscribePush
      security:
        - StaffJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, p256dh, auth]
              properties:
                endpoint:
                  type: string
                  format: uri
                  description: FCM/APNs endpoint URL from W3C PushSubscription.endpoint
                p256dh:
                  type: string
                  description: Base64url client EC public key (PushSubscription.getKey("p256dh"))
                auth:
                  type: string
                  description: Base64url 16-byte auth secret (PushSubscription.getKey("auth"))
      responses:
        '204':
          description: Subscription stored

  /staff/push/call-next:
    post:
      tags: [Staff - Push]
      summary: Advance the queue from a lock-screen notification action
      description: |
        Called by the Service Worker background fetch when the barber taps the
        "NEXT CLIENT" action button on the push notification. Authenticates via
        PushActionToken (not StaffJWT — JWT expires mid-haircut, see Law 18).

        Executes the same call-next domain function as POST /staff/queue/call-next.
        The queue_sessions FOR UPDATE lock serializes concurrent calls from multiple
        devices (Law 1). Routing mode is respected (pooled/hybrid/barber_specific).

        Service Worker MUST update the notification on every response — including
        errors — so the barber always sees current queue state (see Law 18 error
        handling contract in 16_web_push_service_worker.md).
      operationId: pushCallNext
      security:
        - PushActionToken: []
      responses:
        '200':
          description: Customer called — return updated queue state for notification refresh
          content:
            application/json:
              schema:
                type: object
                required: [called_entry, waiting_arrived_count, estimated_wait_minutes]
                properties:
                  called_entry:
                    $ref: '#/components/schemas/QueueEntryStaff'
                  waiting_arrived_count:
                    type: integer
                    description: Remaining arrived dispatchable entries after this call
                  estimated_wait_minutes:
                    type: integer
        '404':
          description: No arrived dispatchable customers at this location
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      waiting_remote_count:
                        type: integer
                        description: Customers in queue but not yet arrived
        '401':
          description: PAT expired or signature invalid — Service Worker must show "Session expired" notification
        '403':
          description: PAT command mismatch (Law 20)
        '429':
          description: Rate limited (1 per 3s per staff member) — barber double-tapped, ignore

  # ── Mode B (own-number WhatsApp) — Phase 1 Premium ────────────────────────

  /admin/locations/{location_id}/whatsapp/connect:
    post:
      tags: [Admin - WhatsApp Mode B]
      summary: Connect a shop's own WABA (Mode B onboarding)
      description: |
        Owner pastes the "BarberBase Integration Config" JSON copied from the Bhejna
        portal. Go validates whatsapp_status == ACTIVE, quality_rating != RED, phone is
        E.164, then test-sends via the Bhejna API. On success it stores ONLY
        business_whatsapp_number, the AES-256-GCM encrypted api_key, the encrypted
        webhook_secret, and sets locations.whatsapp_mode = 'own_number'. Returns the
        webhook URL the owner must paste back into the Bhejna portal.
        See: 06_bhejna_whatsapp.md — "Mode B One-Paste Onboarding Flow"
      operationId: connectWhatsAppModeB
      security:
        - StaffJWT: []
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDv7'
      requestBody:
        required: true
        description: Config blob copied verbatim from the Bhejna Developer Settings page.
        content:
          application/json:
            schema:
              type: object
              required: [bhejna_config_version, phone_number, api_key, webhook_secret, whatsapp_status]
              properties:
                bhejna_config_version:
                  type: string
                  example: "1"
                waba_id:
                  type: string
                  description: Validation/diagnostic only — not persisted.
                phone_number:
                  $ref: '#/components/schemas/PhoneNumber'
                phone_number_id:
                  type: string
                api_key:
                  type: string
                  description: Stored AES-256-GCM encrypted in locations.bhejna_api_key_encrypted.
                webhook_secret:
                  type: string
                  description: Stored AES-256-GCM encrypted in locations.bhejna_webhook_secret_encrypted.
                whatsapp_status:
                  type: string
                  description: Must equal ACTIVE or connect is rejected.
                display_name:
                  type: string
                  description: Validation/diagnostic only — not persisted.
                quality_rating:
                  type: string
                  description: Rejected if RED. Validation/diagnostic only — not persisted.
                messaging_limit:
                  type: integer
                  description: Validation/diagnostic only — not persisted.
      responses:
        '200':
          description: Connected — returns the webhook URL to paste into the Bhejna portal
          content:
            application/json:
              schema:
                type: object
                required: [whatsapp_mode, webhook_url]
                properties:
                  whatsapp_mode:
                    type: string
                    enum: [own_number]
                  webhook_url:
                    type: string
                    format: uri
                    example: "https://api.barberbase.in/v1/webhooks/bhejna/loc/0190..."
        '422':
          description: Validation failed (status not ACTIVE, quality RED, bad phone, or test-send failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/locations/{location_id}/whatsapp/disconnect:
    post:
      tags: [Admin - WhatsApp Mode B]
      summary: Disconnect a shop's own WABA (revert to shared platform number)
      description: |
        Sets locations.whatsapp_mode = 'shared' and clears the encrypted credentials.
        The location falls back to the platform Mode A number for all sends.
        See: 06_bhejna_whatsapp.md — "Mode B One-Paste Onboarding Flow"
      operationId: disconnectWhatsAppModeB
      security:
        - StaffJWT: []
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDv7'
      responses:
        '204':
          description: Disconnected — location reverted to shared platform number

  /webhooks/bhejna/loc/{location_id}:
    post:
      tags: [Webhooks]
      summary: Bhejna inbound webhook (Mode B — per-location)
      description: |
        Mode B inbound webhook. The location_id path param resolves the shop's
        encrypted webhook_secret BEFORE the payload is parsed; HMAC-SHA256 is verified
        against the decrypted secret. On success, INSERT webhook_events (location_id
        pre-filled) ON CONFLICT (source, external_event_id) DO NOTHING and return 200
        immediately (Law 9). Processing is asynchronous (see 07_webhooks_outbox_workers.md).
        Identical payload shapes to the Mode A webhook (see /webhooks/bhejna).
        See: 06_bhejna_whatsapp.md — "Two Webhook Handlers"
      operationId: receiveBhejnaWebhookModeB
      security:
        - BhejnaKey: []
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDv7'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Bhejna event payload (message.received / message.status_updated).
      responses:
        '200':
          description: Accepted (always 200 after HMAC passes — never 5xx, Law 9)
        '401':
          description: HMAC signature invalid
        '404':
          description: location_id not found or not in own_number mode
