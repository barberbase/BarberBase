      responses:
        '201':
          description: Service variant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceVariant'

  /admin/locations/{location_id}/services/{variant_id}:
    patch:
      tags: [Admin - Services]
      summary: Update a service variant
      description: |
        Price/duration changes do NOT affect existing visit_services snapshots.
        Snapshots are immutable. Only future bookings use new values.
      operationId: updateServiceVariant
      security:
        - StaffJWT: []
      parameters:
        - name: location_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDv7'
        - name: variant_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUIDv7'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                variant_name:
                  type: string
                duration_minutes:
                  type: integer
